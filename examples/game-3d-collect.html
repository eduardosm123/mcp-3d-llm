<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Orb Collector — 3D game (G3D) example</title>
  <script type="importmap">
    { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.182.0/build/three.module.js" } }
  </script>
  <style> body { margin: 0; } </style>
</head>
<body>
  <canvas id="game" width="800" height="600"></canvas>
  <script type="module">
    import * as THREE from "three";
    import * as G3D from "/__helpers/game3d.js";

    const w = G3D.world(document.getElementById("game"), { ground: { size: 36, color: 0x2b3a2e } });

    // player
    const player = new THREE.Mesh(
      new THREE.CapsuleGeometry(0.4, 0.8, 6, 14),
      new THREE.MeshStandardMaterial({ color: 0x4a90d9, roughness: 0.5 })
    );
    player.name = "player";
    player.position.set(0, 1.0, 0);
    w.scene.add(player);
    const nose = new THREE.Mesh(
      new THREE.ConeGeometry(0.15, 0.3, 10),
      new THREE.MeshStandardMaterial({ color: 0xffcc44 })
    );
    nose.rotation.x = Math.PI / 2;
    nose.position.set(0, 0.3, 0.5);
    player.add(nose); // shows facing direction

    // obstacles (also colliders)
    const blockMat = new THREE.MeshStandardMaterial({ color: 0x55607a, roughness: 0.8 });
    for (const [x, z, s] of [[6, 2, 2], [-5, -4, 1.5], [2, -7, 2.5], [-7, 5, 2]]) {
      const block = new THREE.Mesh(new THREE.BoxGeometry(s, s, s), blockMat);
      block.position.set(x, s / 2, z);
      w.scene.add(block);
      w.addCollider(block);
    }

    // orbs to collect
    const orbMat = new THREE.MeshStandardMaterial({ color: 0xffd24a, emissive: 0x886611, roughness: 0.3 });
    const orbs = [];
    for (let i = 0; i < 6; i++) {
      const a = (i / 6) * Math.PI * 2;
      const orb = new THREE.Mesh(new THREE.SphereGeometry(0.35, 16, 12), orbMat);
      orb.position.set(Math.cos(a) * 9, 1.0, Math.sin(a) * 9);
      orb.userData.baseY = 1.0;
      w.scene.add(orb);
      orbs.push(orb);
    }

    const ctrl = G3D.characterController(player, w, { speed: 7, jump: 9 });
    const cam = G3D.thirdPersonCamera(w, player, { distance: 9, height: 5 });

    const state = { score: 0, total: orbs.length, won: false };

    w.loop((dt) => {
      ctrl.update(dt);
      cam.update(dt);
      for (const orb of [...orbs]) {
        orb.rotation.y += dt * 2;
        orb.position.y = orb.userData.baseY + Math.sin(w.time * 3 + orb.position.x) * 0.2;
        if (w.near(player, orb, 1.3)) {
          w.scene.remove(orb);
          orbs.splice(orbs.indexOf(orb), 1);
          state.score++;
          if (state.score === state.total) state.won = true;
        }
      }
      if (player.position.y < -10) player.position.set(0, 2, 0); // fell off — respawn
    });

    window.__state = () => ({
      score: state.score,
      total: state.total,
      won: state.won,
      player: {
        x: Math.round(player.position.x * 10) / 10,
        y: Math.round(player.position.y * 10) / 10,
        z: Math.round(player.position.z * 10) / 10,
        on_ground: ctrl.onGround,
      },
      orbs_left: orbs.length,
    });
  </script>
</body>
</html>
