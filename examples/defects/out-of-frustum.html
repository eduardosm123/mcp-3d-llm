<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" /><title>Defect: camera pointing away from the scene</title>
  <script type="importmap">
    { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.182.0/build/three.module.js" } }
  </script>
  <style>body{margin:0}</style>
</head>
<body>
  <canvas id="c" width="800" height="600"></canvas>
  <script type="module">
    import * as THREE from "three";
    const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById("c") });
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x252535);
    const camera = new THREE.PerspectiveCamera(50, 800 / 600, 0.1, 100);
    camera.position.set(0, 1, 5);
    camera.lookAt(0, 1, 50); // looking AWAY from the model behind the camera

    const box = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), new THREE.MeshStandardMaterial({ color: 0x4477aa }));
    box.position.set(0, 0.5, -5); // behind the camera, which is looking towards +z
    scene.add(box);

    scene.add(new THREE.DirectionalLight(0xffffff, 2));
    scene.add(new THREE.AmbientLight(0xffffff, 0.4));
    renderer.render(scene, camera);
    window.__scene = { scene, camera, renderer };
  </script>
</body>
</html>
