<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Textured table — Three.js + helpers example</title>
  <script type="importmap">
    { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.182.0/build/three.module.js" } }
  </script>
  <style> body { margin: 0; } </style>
</head>
<body>
  <canvas id="scene" width="800" height="600"></canvas>
  <script src="/__helpers/texture-helpers.js"></script>
  <script type="module">
    import * as THREE from "three";
    import * as H from "/__helpers/three-helpers.js";

    const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById("scene"), antialias: true });
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1d2230);
    const camera = new THREE.PerspectiveCamera(50, 800 / 600, 0.1, 100);

    // table top
    const top = new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.08, 0.9), H.makeMaterial({ color: 0x9a6b3f }));
    top.name = "table_top";
    top.position.y = 0.76;
    H.applyTexture(top, { map: TEX.wood({ seed: 11 }), repeat: 1, bumpMap: TEX.bump({ contrast: 1.4 }), bumpScale: 0.4 });
    scene.add(top);

    // legs: build one, mirror it, mirror the pair
    const legGeo = new THREE.CylinderGeometry(0.04, 0.035, 0.72, 12);
    const legMat = H.makeMaterial({ color: 0x6b4a2c, kind: "matte" });
    const leg1 = new THREE.Mesh(legGeo, legMat);
    leg1.name = "leg_fl";
    leg1.position.set(0.7, 0.36, 0.36);
    scene.add(leg1);
    H.mirrorX(leg1, { parent: scene }).name = "leg_fr";
    const leg3 = leg1.clone();
    leg3.name = "leg_bl";
    leg3.position.z = -0.36;
    scene.add(leg3);
    H.mirrorX(leg3, { parent: scene }).name = "leg_br";

    // marble vase on top
    const vase = new THREE.Mesh(
      new THREE.LatheGeometry(
        [new THREE.Vector2(0.001, 0), new THREE.Vector2(0.09, 0.02), new THREE.Vector2(0.05, 0.18), new THREE.Vector2(0.08, 0.3)],
        20
      ),
      H.makeMaterial({ color: 0xffffff, kind: "shiny" })
    );
    vase.name = "vase";
    H.applyTexture(vase, { map: TEX.marble({ seed: 3 }) });
    H.anchor(vase, top, { face: "top" });
    scene.add(vase);

    H.autoGround(scene, { color: 0x33384a });
    H.threePointLights(scene);
    H.frameCamera(camera, scene);
    H.register({ scene, camera, renderer });
  </script>
</body>
</html>
