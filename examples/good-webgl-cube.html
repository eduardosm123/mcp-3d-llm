<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Textured stack — raw WebGL (GLH) example</title>
  <style> body { margin: 0; } </style>
</head>
<body>
  <canvas id="c" width="800" height="600"></canvas>
  <script src="/__helpers/webgl-helpers.js"></script>
  <script src="/__helpers/texture-helpers.js"></script>
  <script>
    const gl = GLH.init(document.getElementById("c"), { clear: [0.09, 0.1, 0.16, 1] });
    const lambert = GLH.program(gl, GLH.defaultShaders.lambert.vs, GLH.defaultShaders.lambert.fs);
    const textured = GLH.program(gl, GLH.defaultShaders.textured.vs, GLH.defaultShaders.textured.fs);

    const cube = GLH.upload(gl, GLH.mesh.cube(1));
    const ball = GLH.upload(gl, GLH.mesh.uvSphere(0.45, 14, 20));
    const ground = GLH.upload(gl, GLH.mesh.cylinder(2.4, 0.08, 28));
    const woodTex = GLH.texture(gl, TEX.wood({ seed: 7 }));
    const noiseTex = GLH.texture(gl, TEX.noise({ colors: ["#355535", "#5a8a4a"], scale: 6 }));

    const I = GLH.mat4.identity;
    const T = (x, y, z) => GLH.mat4.translate(I(), x, y, z);

    function draw(view) {
      GLH.clear(gl);
      const proj = GLH.mat4.perspective(50, 800 / 600, 0.1, 100);
      const common = { u_view: view, u_proj: proj, u_lightDir: [-0.5, -1, -0.35], u_ambient: 0.3 };
      GLH.draw(gl, lambert, ground, { ...common, u_model: T(0, -0.04, 0), u_color: [0.25, 0.26, 0.32] });
      GLH.draw(gl, textured, cube, { ...common, u_model: T(0, 0.5, 0), u_texture: woodTex });
      GLH.draw(gl, textured, ball, { ...common, u_model: T(0, 1.45, 0), u_texture: noiseTex });
    }

    GLH.registerView(({ azimuth_deg, elevation_deg, distance_factor }) =>
      draw(GLH.orbitCamera({
        azimuth_deg, elevation_deg,
        distance: 4.5 * (distance_factor || 1),
        target: [0, 0.7, 0],
      })));
    window.__setView({ azimuth_deg: 35, elevation_deg: 25 });
  </script>
</body>
</html>
